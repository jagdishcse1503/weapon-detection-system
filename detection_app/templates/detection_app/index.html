<!DOCTYPE html>
<html>
<head>
    <title>AI Weapon Detection Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0f172a;
            color:white;
        }

        .card-box{
            border-radius:15px;
            padding:20px;
            color:white;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        .blue{
            background:#2563eb;
        }

        .red{
            background:#dc2626;
        }

        .green{
            background:#16a34a;
        }

        .orange{
            background:#ea580c;
        }

        .dashboard-title{
            font-size:32px;
            font-weight:bold;
        }

        .menu-btn{
            width:100%;
            padding:15px;
            margin-top:10px;
            font-size:18px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <h1 class="dashboard-title text-center mb-4">
        AI Weapon Detection Dashboard
    </h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card-box blue">
                <h5>Total Uploads</h5>
                <h2>156</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box red">
                <h5>Weapons Detected</h5>
                <h2>23</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box green">
                <h5>Images Scanned</h5>
                <h2>98</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card-box orange">
                <h5>Videos Scanned</h5>
                <h2>58</h2>
            </div>
        </div>

    </div>

    <hr class="mt-5 mb-5">

    <div class="row">

        <div class="col-md-4">

            <a href="/realtime_detection/" class="btn btn-danger menu-btn">
                Real Time Detection
            </a>

            <button class="btn btn-primary menu-btn">
                Upload Image
            </button>

            <button class="btn btn-success menu-btn">
                Upload Video
            </button>

        </div>

        <div class="col-md-8">

            <div class="card p-3 text-dark">

                <h4>System Status</h4>

                <table class="table">

                    <tr>
                        <td>YOLOv8 Model</td>
                        <td>✅ Active</td>
                    </tr>

                    <tr>
                        <td>Camera</td>
                        <td>✅ Connected</td>
                    </tr>

                    <tr>
                        <td>Email Alerts</td>
                        <td>✅ Running</td>
                    </tr>

                    <tr>
                        <td>Database</td>
                        <td>✅ Connected</td>
                    </tr>

                </table>

            </div>

        </div>

    </div>

</div>

</body>
</html>
